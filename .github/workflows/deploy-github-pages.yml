name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  CUSTOM_DOMAIN: skillstart.alfalock.ch
  BUILD_DIR: dist/.angular-build
  PUBLISH_DIR: dist/skillStart

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular application
        run: |
          rm -rf "${BUILD_DIR}" "${PUBLISH_DIR}"

          pnpm exec ng build \
            --configuration production \
            --base-href / \
            --output-path "${BUILD_DIR}"

      - name: Prepare Pages artifact
        run: |
          mkdir -p "${PUBLISH_DIR}"

          if [ -d "${BUILD_DIR}/browser" ]; then
            cp -a "${BUILD_DIR}/browser/." "${PUBLISH_DIR}/"
          else
            cp -a "${BUILD_DIR}/." "${PUBLISH_DIR}/"
          fi

          printf '%s\n' "${CUSTOM_DOMAIN}" > "${PUBLISH_DIR}/CNAME"
          cp "${PUBLISH_DIR}/index.html" "${PUBLISH_DIR}/404.html"

          test -f "${PUBLISH_DIR}/index.html"
          grep -q '<base href="/">' "${PUBLISH_DIR}/index.html"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/skillStart

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
