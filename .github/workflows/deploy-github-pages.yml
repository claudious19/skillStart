name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  CUSTOM_DOMAIN: skillstart.alfalock.ch
  PUBLISH_DIR: dist/skillStart
  BUILD_DIR: dist/.angular-build

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous build
        run: |
          rm -rf "${BUILD_DIR}"
          rm -rf "${PUBLISH_DIR}"

      - name: Build Angular application
        run: |
          pnpm exec ng build \
            --configuration production \
            --base-href / \
            --output-path "${BUILD_DIR}"

      - name: Prepare GitHub Pages root
        shell: bash
        run: |
          mkdir -p "${PUBLISH_DIR}"

          if [ -d "${BUILD_DIR}/browser" ]; then
            cp -a "${BUILD_DIR}/browser/." "${PUBLISH_DIR}/"
          else
            cp -a "${BUILD_DIR}/." "${PUBLISH_DIR}/"
          fi

          printf '%s\n' "${CUSTOM_DOMAIN}" > "${PUBLISH_DIR}/CNAME"

          # Fallback für Angular-Routen bei direktem Seitenaufruf
          cp "${PUBLISH_DIR}/index.html" "${PUBLISH_DIR}/404.html"

      - name: Verify deployment files
        shell: bash
        run: |
          test -f "${PUBLISH_DIR}/index.html"
          test -f "${PUBLISH_DIR}/404.html"
          test -f "${PUBLISH_DIR}/CNAME"

          grep -q '<base href="/">' "${PUBLISH_DIR}/index.html"
          grep -qx "${CUSTOM_DOMAIN}" "${PUBLISH_DIR}/CNAME"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist/skillStart
          cname: skillstart.alfalock.ch
          force_orphan: true
