<section class="profile-shell">
  <a routerLink="/company/dashboard" class="back-link">Zurück zum Dashboard</a>

  @if (isLoading()) {
    <p>Lade Firmenprofil ...</p>
  } @else {
    <header class="profile-header">
      <p class="eyebrow">Company Profil</p>
      <h1>Firmenprofil bearbeiten</h1>
      <p class="subtitle">Pflege hier die öffentlichen Basisdaten deiner Firma.</p>
    </header>

    @if (errorMessage()) {
      <p class="form-message error">{{ errorMessage() }}</p>
    }

    @if (successMessage()) {
      <p class="form-message success">{{ successMessage() }}</p>
    }

    <form class="profile-form" [formGroup]="form" (ngSubmit)="save()">
      <label>
        <span>Beschreibung</span>
        <textarea
          formControlName="description"
          rows="5"
          placeholder="Beschreibe euer Unternehmen, Team und Fokus."
        ></textarea>
      </label>

      <label>
        <span>Ort</span>
        <input type="text" formControlName="location" placeholder="Zürich" />
      </label>

      <div class="profile-actions">
        <button type="submit" [disabled]="form.invalid">Speichern</button>
        <button type="button" class="secondary" (click)="logout()">Logout</button>
      </div>
    </form>
  }
</section>
