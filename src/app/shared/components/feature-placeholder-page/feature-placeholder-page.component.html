<section class="placeholder-page">
  <div class="placeholder-page__card">
    @if (section) {
      <p class="placeholder-page__section">{{ section }}</p>
    }

    <h1>{{ title }}</h1>
    <p class="placeholder-page__description">{{ description }}</p>

    @if (nextStep) {
      <p class="placeholder-page__next-step">{{ nextStep }}</p>
    }
  </div>
</section>
